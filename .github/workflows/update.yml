name: Update FOMC Statements
 
# Runs automatically on weekdays at 6pm ET (23:00 UTC).
# Also runs immediately on any push to main, and can be triggered manually.
# Emergency FOMC meetings are also covered — the script checks daily.
 
on:
  schedule:
    - cron: "0 23 * * 1-5"   # weekdays at 6pm ET
  push:
    branches: [main]
  workflow_dispatch:           # manual trigger from the Actions tab
 
permissions:
  contents: write              # needed to commit updated index.html back to repo
 
jobs:
  update:
    runs-on: ubuntu-latest
 
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Install dependencies
        run: pip install requests beautifulsoup4
 
      - name: Check for new FOMC statements
        run: python update_statements.py
 
      - name: Commit and push if index.html changed
        run: |
          git config user.name  "FOMC Tracker Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet \
            && echo "No changes to commit." \
            || (git commit -m "Auto-update: add new FOMC statement" && git push)
